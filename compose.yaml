name: memforge

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOCKERHUB_PREFIX: ${MEMFORGE_DOCKERHUB_PREFIX:-}
        DEBIAN_MIRROR: ${MEMFORGE_DEBIAN_MIRROR:-}
        DEBIAN_SECURITY_MIRROR: ${MEMFORGE_DEBIAN_SECURITY_MIRROR:-}
        PYPI_INDEX_URL: ${MEMFORGE_PYPI_INDEX_URL:-}
    env_file:
      - path: .env
        required: false
    environment:
      MEMFORGE_BASE_DIR: /data
      MEMFORGE_ADMIN_API_PORT: 8765
      MEMFORGE_CORS_ORIGINS: http://localhost:5174,http://127.0.0.1:5174
      # A Jira session cookie is uploaded over this API. The port below is
      # published on loopback only by default, so the upload stays on this
      # machine and plaintext is safe; that is why this defaults to on. To
      # expose the API to the network, set MEMFORGE_API_BIND_ADDR=0.0.0.0,
      # then turn this off (empty) and serve over HTTPS.
      MEMFORGE_ALLOW_PLAINTEXT_SESSION_UPLOAD: ${MEMFORGE_ALLOW_PLAINTEXT_SESSION_UPLOAD:-1}
    ports:
      # Loopback-only by default: reachable from this host (CLI, browser), not the
      # network. Set MEMFORGE_API_BIND_ADDR=0.0.0.0 to expose it (and add HTTPS).
      - "${MEMFORGE_API_BIND_ADDR:-127.0.0.1}:${MEMFORGE_API_HOST_PORT:-8765}:8765"
    volumes:
      - memforge-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/health', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  admin-ui:
    build:
      context: .
      dockerfile: admin-ui/Dockerfile
      args:
        DOCKERHUB_PREFIX: ${MEMFORGE_DOCKERHUB_PREFIX:-}
        NPM_REGISTRY: ${MEMFORGE_NPM_REGISTRY:-}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${MEMFORGE_ADMIN_UI_HOST_PORT:-5174}:8080"

volumes:
  memforge-data:
