name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run python scripts/sync_plugin_mcp_proxy.py --check
      - run: uv run ruff check src tests scripts/sync_plugin_mcp_proxy.py
      # Temporary hang probe: stream db fixture boundaries without changing
      # test verbosity so the contaminating startup-runtime test is visible.
      - run: |
          for attempt in 1 2 3; do
            uv run pytest -q -s tests/test_startup_runtime.py -o faulthandler_timeout=30
          done

  admin-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
