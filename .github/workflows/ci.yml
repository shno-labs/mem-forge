name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run python scripts/sync_plugin_mcp_proxy.py --check
      - run: uv run ruff check src tests scripts/sync_plugin_mcp_proxy.py
      # Temporary regression probe: preserve the last completed fixture phase
      # outside pytest capture when the intermittent teardown race occurs.
      - run: |
          for attempt in 1 2 3 4 5; do
            export PYTEST_HANG_LOG="/tmp/memforge-pytest-hang-${attempt}.log"
            status=0
            timeout --signal=TERM --kill-after=10s 60s \
              uv run pytest -q tests/test_startup_runtime.py -o faulthandler_timeout=30 || status=$?
            cat "$PYTEST_HANG_LOG"
            if [ "$status" -ne 0 ]; then
              exit "$status"
            fi
          done

  admin-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
